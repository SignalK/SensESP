; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]

; Change the default environment to match your board. Valid options are:
; - arduino_esp32
; - pioarduino_esp32
; - espidf_esp32
; - pioarduino_esp32c3
; - espidf_esp32c3
; - shesp32
; - halmet
; - halser

default_envs = pioarduino_esp32

[env]

; Options common for all working environments

;; Uncomment and change these if PlatformIO can't auto-detect the ports
;monitor_port = /dev/tty.usbserial-310
;upload_port = /dev/tty.usbserial-310
upload_speed = 2000000
monitor_speed = 115200

lib_deps =
    mairas/ReactESP @ ^3.2.0
    bblanchon/ArduinoJson @ ^7.0.0
    pfeerick/elapsedMillis @ ^1.0.6
    bxparks/AceButton @ ^1.10.1
    ; Add any additional dependencies here
    ;ttlappalainen/NMEA2000-library
    ;NMEA2000_twai=https://github.com/skarlsson/NMEA2000_twai

build_flags =
    ; Max (and default) debugging level in Arduino ESP32 Core
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    ; Use the ESP-IDF logging library - required by SensESP.
    -D USE_ESP_IDF_LOG

; This line defines the partition table to use. "min_spiffs" has two app
; partitions, one for OTA updates and one for the running app, but the
; SPIFFS filesystem is quite small. For 8 MB flash boards such as HALMET,
; you can use "default_8MB.csv" instead.

board_build.partitions = min_spiffs.csv

;; Uncomment the following lines to use Over-the-air (OTA) Updates
;upload_protocol = espota
;upload_port = IP_ADDRESS_OF_ESP_HERE
;upload_flags =
;  --auth=YOUR_OTA_PASSWORD

; You shouldn't need to touch the settings in this section below this line.

build_unflags =
    -Werror=reorder
monitor_filters = esp32_exception_decoder

test_build_src = true
check_tool = clangtidy
check_flags =
    clangtidy: --fix --format-style=file --config-file=.clang-tidy


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Platform configurations follow

[arduino]

platform = espressif32 @ ^6.9.0
framework = arduino

lib_ignore =
    esp_websocket_client

; test_event_loop uses RepeatSensor in a way that triggers a deleted copy
; constructor error on the older Arduino toolchain (espressif32 v6.x).
test_ignore =
    system/test_event_loop

build_flags =
    ${env.build_flags}
    ; Arduino Core bug workaround: define the log tag for the Arduino
    ; logging macros.
    -D TAG='"Arduino"'

[pioarduino]

platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino

; The library.json format doesn't support dependencies conditional on the
; platform version, so we have to use the lib_deps option to specify the
; esp_websocket_client library only for the ESP-IDF framework.

lib_deps =
    ${env.lib_deps}
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413

build_flags =
    ${env.build_flags}
    -D SENSESP_SSL_SUPPORT=1

[espidf]

platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = espidf, arduino

; The library.json format doesn't support dependencies conditional on the
; platform version, so we have to use the lib_deps option to specify the
; esp_websocket_client library only for the ESP-IDF framework.

lib_deps =
    ${env.lib_deps}
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413

build_flags =
    ${env.build_flags}
    -D SENSESP_SSL_SUPPORT=1

; Cert bundle embedding for esp_insights + esp_rainmaker. These components
; are only pulled in by Arduino-ESP32 on chips where esp_insights and
; esp_rainmaker are enabled (esp32, esp32s2, esp32s3, esp32c3, etc.) —
; NOT on esp32c2 or esp32p4. Envs for those targets must NOT inherit
; this section.
;
; See framework-arduinoespressif32/idf_component.yml:
;   espressif/esp_insights: rules: - if: target not in [esp32c2, esp32p4]
;   espressif/esp_rainmaker: rules: - if: target not in [esp32c2, esp32p4]
[espidf_cloud_certs]

board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Board configurations follow

[esp32]

board = esp32dev
build_flags =
    ${env.build_flags}
    -D BUTTON_BUILTIN=0
    -D LED_BUILTIN=2

[esp32c3]

board = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -D SENSESP_BUTTON_PIN=9
    -D PIN_RGB_LED=8
    ; Use the CDC USB port as Serial
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[esp32p4]

board = esp32-p4
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Permutations of platform and device.

[env:arduino_esp32]

extends = arduino, esp32
build_flags =
    ${arduino.build_flags}
    ${esp32.build_flags}

[env:pioarduino_esp32]

extends = pioarduino, esp32
build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}

[env:espidf_esp32]

extends = espidf, espidf_cloud_certs, esp32
build_flags =
    ${espidf.build_flags}
    ${esp32.build_flags}

[env:arduino_esp32c3]

extends = arduino, esp32c3
build_flags =
    ${arduino.build_flags}
    ${esp32c3.build_flags}

[env:pioarduino_esp32c3]

extends = pioarduino, esp32c3
build_flags =
    ${pioarduino.build_flags}
    ${esp32c3.build_flags}

[env:espidf_esp32c3]

extends = espidf, espidf_cloud_certs, esp32c3
build_flags =
    ${espidf.build_flags}
    ${esp32c3.build_flags}

[env:espidf_esp32p4]

; ESP32-P4 only supports the espidf-arduino mixed build mode. The
; Arduino-ESP32 prebuilt libs for P4 ship a sdkconfig that SensESP's
; feature set does not fully match (BT host stack, HCI VHCI flags),
; so the project-owned sdkconfig path of `framework = espidf, arduino`
; is the only way to express what we need.
extends = espidf, esp32p4
build_flags =
    ${espidf.build_flags}
    ${esp32p4.build_flags}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Individual board configurations

[env:shesp32]

extends = pioarduino, esp32
build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}

[env:halmet]

extends = pioarduino, esp32
board_build.partitions = default_8MB.csv

build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}

[env:halser]

extends = pioarduino, esp32c3

build_flags =
    ${pioarduino.build_flags}
    ${esp32c3.build_flags}
